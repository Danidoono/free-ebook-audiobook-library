<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hustle Hub - AI Tool Finder</title>
<meta name="description" content="Find the best AI tools for your side hustle using a smart AI tool finder.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --card:#111;
  --yellow:#FFD60A;
  --muted:#bdbdbd;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:white;
}

header{
  text-align:center;
  padding:80px 20px;
  background:radial-gradient(circle at top,#3a2f00,#050505 60%);
}

.logo{
  font-size:1.4rem;
  font-weight:800;
  color:var(--yellow);
  margin-bottom:20px;
}

h1{
  font-size:3.5rem;
  color:var(--yellow);
}

p{
  color:var(--muted);
  line-height:1.6;
}

.search-box{
  max-width:850px;
  margin:35px auto 0;
  background:#111;
  border:1px solid rgba(255,214,10,.3);
  border-radius:24px;
  padding:18px;
}

textarea{
  width:100%;
  min-height:110px;
  background:#050505;
  color:white;
  border:1px solid rgba(255,214,10,.25);
  border-radius:16px;
  padding:18px;
  font-size:1rem;
  resize:none;
  outline:none;
}

button{
  margin-top:14px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:var(--yellow);
  color:black;
  font-weight:800;
  font-size:1rem;
  cursor:pointer;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:35px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid rgba(255,214,10,.18);
  border-radius:20px;
  padding:24px;
}

.card h3{
  color:var(--yellow);
  margin-bottom:10px;
}

.card p{
  margin-bottom:18px;
}

.btn{
  display:inline-block;
  background:var(--yellow);
  color:black;
  padding:10px 15px;
  border-radius:12px;
  font-weight:800;
  text-decoration:none;
}

.section-title{
  color:var(--yellow);
  margin:30px 0 18px;
}

.examples{
  margin-top:18px;
  color:#999;
  font-size:.95rem;
}

footer{
  text-align:center;
  padding:40px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <div class="logo">⚡ AI Hustle Hub</div>
  <h1>Find the Right AI Tool</h1>
  <p>Type what you want to do, and we will recommend the best AI tools for your side hustle.</p>

  <div class="search-box">
    <textarea id="userInput" placeholder="Example: I want to make faceless YouTube videos with AI voice and captions..."></textarea>
    <button onclick="findTools()">Find My AI Tools</button>
    <div class="examples">
      Try: “make TikTok videos”, “write blog posts”, “create AI voice”, “start dropshipping”, “make logos”, “automate my business”
    </div>
  </div>
</header>

<main class="container">
  <h2 class="section-title">Recommended Tools</h2>
  <div id="results" class="grid"></div>
</main>

<footer>
  © 2026 AI Hustle Hub
</footer>

<script>
const tools = [
  {
    name:"ChatGPT",
    tags:["writing","ideas","business","side hustle","email","script","content","freelance"],
    desc:"Best for business ideas, content writing, scripts, emails, and planning side hustles.",
    url:"https://chatgpt.com"
  },
  {
    name:"Claude",
    tags:["writing","research","blog","long form","code","summarize"],
    desc:"Great for long-form writing, research, coding help, and strategy.",
    url:"https://claude.ai"
  },
  {
    name:"Perplexity",
    tags:["research","market","competitor","trend","search","facts"],
    desc:"Best for researching markets, competitors, trends, and content ideas.",
    url:"https://www.perplexity.ai"
  },
  {
    name:"Runway",
    tags:["video","ai video","youtube","tiktok","ad","creator"],
    desc:"Create AI-generated videos for TikTok, YouTube Shorts, ads, and social content.",
    url:"https://runwayml.com"
  },
  {
    name:"Pika",
    tags:["video","ai video","shorts","animation","creator"],
    desc:"Generate short AI videos from text prompts and images.",
    url:"https://pika.art"
  },
  {
    name:"OpusClip",
    tags:["shorts","tiktok","youtube","reels","clips","viral"],
    desc:"Turn long videos into viral short clips for TikTok, Reels, and YouTube Shorts.",
    url:"https://www.opus.pro"
  },
  {
    name:"CapCut",
    tags:["edit","video","tiktok","captions","shorts","reels"],
    desc:"Edit short-form videos with captions, templates, effects, and AI tools.",
    url:"https://www.capcut.com"
  },
  {
    name:"ElevenLabs",
    tags:["voice","voiceover","audio","faceless","youtube","podcast"],
    desc:"Create realistic AI voiceovers for faceless videos, podcasts, and ads.",
    url:"https://elevenlabs.io"
  },
  {
    name:"Murf AI",
    tags:["voice","voiceover","presentation","course","audio"],
    desc:"Professional AI voiceovers for videos, courses, and presentations.",
    url:"https://murf.ai"
  },
  {
    name:"Midjourney",
    tags:["image","art","thumbnail","design","poster","brand"],
    desc:"Create premium AI images for thumbnails, branding, and digital products.",
    url:"https://www.midjourney.com"
  },
  {
    name:"Canva AI",
    tags:["design","logo","thumbnail","poster","social media","presentation"],
    desc:"Create logos, social posts, thumbnails, presentations, and marketing graphics.",
    url:"https://www.canva.com"
  },
  {
    name:"Leonardo AI",
    tags:["image","art","mockup","game","product","design"],
    desc:"Create AI art, product mockups, game assets, and marketing visuals.",
    url:"https://leonardo.ai"
  },
  {
    name:"Shopify Magic",
    tags:["ecommerce","dropshipping","store","product","sell online"],
    desc:"AI ecommerce tools for product descriptions, online stores, and selling products.",
    url:"https://www.shopify.com/magic"
  },
  {
    name:"AdCreative.ai",
    tags:["ads","marketing","ecommerce","facebook ads","instagram ads"],
    desc:"Create AI ad creatives for ecommerce, social media, and marketing campaigns.",
    url:"https://www.adcreative.ai"
  },
  {
    name:"Zapier",
    tags:["automation","workflow","business","apps","no code"],
    desc:"Automate side hustle workflows and connect apps without coding.",
    url:"https://zapier.com"
  },
  {
    name:"Make",
    tags:["automation","workflow","business","apps","no code"],
    desc:"Build powerful business and marketing automations visually.",
    url:"https://www.make.com"
  },
  {
    name:"Gamma",
    tags:["presentation","pitch deck","slides","business","course"],
    desc:"Create AI presentations, pitch decks, guides, and business documents.",
    url:"https://gamma.app"
  },
  {
    name:"Surfer SEO",
    tags:["seo","blog","google","ranking","content"],
    desc:"Optimize blog posts and articles to rank better on Google.",
    url:"https://surferseo.com"
  }
];

function findTools(){
  const input = document.getElementById("userInput").value.toLowerCase();
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(input.trim() === ""){
    results.innerHTML = "<p>Please type what you want to create or automate.</p>";
    return;
  }

  let matched = tools.filter(tool =>
    tool.tags.some(tag => input.includes(tag))
  );

  if(input.includes("faceless")){
    matched.push(...tools.filter(t => ["ElevenLabs","CapCut","OpusClip","Runway"].includes(t.name)));
  }

  if(input.includes("money") || input.includes("side hustle")){
    matched.push(...tools.filter(t => ["ChatGPT","Canva AI","Zapier","Shopify Magic"].includes(t.name)));
  }

  matched = [...new Map(matched.map(tool => [tool.name, tool])).values()];

  if(matched.length === 0){
    matched = tools.slice(0,6);
  }

  matched.forEach(tool => {
    results.innerHTML += `
      <div class="card">
        <h3>${tool.name}</h3>
        <p>${tool.desc}</p>
        <a class="btn" href="${tool.url}" target="_blank">Open Tool</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
